{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PharmaSFO{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="navbar">
        <h1>
    <a href="{% url 'dashboard' %}" class="logo">PharmaSFO</a>
</h1>
        <div>
            <span>{{ user.username }} ({{ user.get_type_display }})</span>
            <form method="post" action="{% url 'logout' %}" style="display:inline">
                {% csrf_token %}
                <button type="submit" style="background:none;border:none;color:white;cursor:pointer;font-size:14px;margin-left:16px;">Logout</button>
            </form>
        </div>
    </nav>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
