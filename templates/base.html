{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PharmaSFO{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="navbar">
        <h1><a href="{% url 'dashboard' %}" class="logo">PharmaSFO</a></h1>
        <div class="navbar-right">
            <span style="font-size:13px; opacity:0.9;">{{ user.username }} &middot; {{ user.get_type_display }}</span>
            <form method="post" action="{% url 'logout' %}" style="display:inline; margin:0;">
                {% csrf_token %}
                <button type="submit" style="background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.4); color:white; cursor:pointer; font-size:13px; padding:4px 12px; border-radius:4px;">
                    Logout
                </button>
            </form>
        </div>
    </nav>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
